<body>
    <h1>Dialog Boxes in JS</h1>
    <ul>
        <li>alert()</li>
        <li>prompt()</li>
        <li>confirm()</li>
    </ul>

    <h2>Alert</h2>
    <p>Alert is just for show alert message to user</p>

    <h2>Prompt</h2>
    <p>Prompt is for input values to user. Always return a string value.</p>

    <h2>confirm</h2>
    <p>confirm is just for user confirm to a specific task or stop. It returns true or false in value.</p>

    <script>

        // Alert
        // let someting = alert("Hello World")
        // console.log(someting)// does't return anything (undefined)

        // Prompt
        // const prmpt = prompt("Hmm", "Hmm"); // second parameter is for default value
        // console.log(typeof prmpt)
        // console.log(prmpt)

        // confirm
        const isDelete = confirm("Would, you like to delete this item ?")
        console.log(isDelete)

        console.log([])
    </script>

    

</body>
